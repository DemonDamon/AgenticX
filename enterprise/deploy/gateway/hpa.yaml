apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agenticx-gateway
  labels:
    app.kubernetes.io/name: agenticx-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agenticx-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # Uncomment when Prometheus Adapter exposes gateway custom metrics:
    # - type: Pods
    #   pods:
    #     metric:
    #       name: agx_gateway_active_streams
    #     target:
    #       type: AverageValue
    #       averageValue: "20"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
