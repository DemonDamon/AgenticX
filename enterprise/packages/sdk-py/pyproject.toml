[project]
name = "agenticx-sdk"
version = "0.1.0"
description = "AgenticX Enterprise Python SDK"
requires-python = ">=3.10"
dependencies = [
  "httpx>=0.27",
  "pydantic>=2.0",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
