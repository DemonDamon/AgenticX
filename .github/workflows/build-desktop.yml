# Build Machi Desktop (macOS) with bundled agx-server; upload DMG artifacts only.
# Optional secrets: CSC_LINK, CSC_KEY_PASSWORD, APPLE_ID, APPLE_ID_PASSWORD, APPLE_TEAM_ID

name: Build Desktop

# GitHub Actions JS actions move to Node 24 (see 2025-09-19 changelog); opt in early to avoid Node 20 deprecation noise.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "macOS architecture to build (arm64 = Apple Silicon, x64 = Intel)"
        required: true
        default: arm64
        type: choice
        options:
          - arm64
          - x64
  push:
    tags:
      - "v*"

jobs:
  build-tag:
    if: github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: arm64
          # macos-13 已退役；Intel/x64 使用 macos-15-intel（至约 2027-08）
          - os: macos-15-intel
            arch: x64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Python 3.12 removed stdlib distutils; node-gyp (node-pty rebuild) still imports it.
      - name: Install setuptools for node-gyp
        run: python3 -m pip install --upgrade pip setuptools

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: packaging/wechat-sidecar/go.sum

      - name: Build agx-server (single arch)
        run: packaging/build_backend.sh ${{ matrix.arch }}

      - name: Build wechat-sidecar
        working-directory: packaging/wechat-sidecar
        run: |
          GOARCH=${{ matrix.arch == 'x64' && 'amd64' || 'arm64' }} GOOS=darwin \
            go build -ldflags "-s -w" -o agx-wechat-sidecar .

      - name: Stage bundled backend (arm64 / x64)
        run: |
          mkdir -p "desktop/bundled-backend/${{ matrix.arch }}"
          cp "packaging/dist/${{ matrix.arch }}/agx-server" "desktop/bundled-backend/${{ matrix.arch }}/agx-server"
          chmod +x "desktop/bundled-backend/${{ matrix.arch }}/agx-server"
          cp "packaging/wechat-sidecar/agx-wechat-sidecar" "desktop/bundled-backend/${{ matrix.arch }}/agx-wechat-sidecar"
          chmod +x "desktop/bundled-backend/${{ matrix.arch }}/agx-wechat-sidecar"

      - name: Install desktop deps
        working-directory: desktop
        run: npm ci

      - name: Build renderer + main
        working-directory: desktop
        run: npm run build

      - name: Clean old DMG artifacts
        working-directory: desktop
        run: rm -f release/*.dmg

      - name: Package (electron-builder, arm64 / x64)
        working-directory: desktop
        env:
          DEBUG: electron-builder
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --${{ matrix.arch }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: machi-${{ matrix.arch }}
          path: desktop/release/*-${{ matrix.arch }}.dmg

  build-dispatch:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ${{ github.event.inputs.arch == 'x64' && 'macos-15-intel' || 'macos-14' }}
    env:
      ARCH: ${{ github.event.inputs.arch }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install setuptools for node-gyp
        run: python3 -m pip install --upgrade pip setuptools

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: packaging/wechat-sidecar/go.sum

      - name: Build agx-server
        run: packaging/build_backend.sh "${{ env.ARCH }}"

      - name: Build wechat-sidecar
        working-directory: packaging/wechat-sidecar
        run: |
          GOARCH=${{ env.ARCH == 'x64' && 'amd64' || 'arm64' }} GOOS=darwin \
            go build -ldflags "-s -w" -o agx-wechat-sidecar .

      - name: Stage bundled backend
        run: |
          mkdir -p "desktop/bundled-backend/${{ env.ARCH }}"
          cp "packaging/dist/${{ env.ARCH }}/agx-server" "desktop/bundled-backend/${{ env.ARCH }}/agx-server"
          chmod +x "desktop/bundled-backend/${{ env.ARCH }}/agx-server"
          cp "packaging/wechat-sidecar/agx-wechat-sidecar" "desktop/bundled-backend/${{ env.ARCH }}/agx-wechat-sidecar"
          chmod +x "desktop/bundled-backend/${{ env.ARCH }}/agx-wechat-sidecar"

      - name: Install desktop deps
        working-directory: desktop
        run: npm ci

      - name: Build renderer + main
        working-directory: desktop
        run: npm run build

      - name: Clean old DMG artifacts
        working-directory: desktop
        run: rm -f release/*.dmg

      - name: Pre-flight check
        working-directory: desktop
        run: |
          echo "=== bundled-backend ==="
          ls -lR bundled-backend/ || echo "bundled-backend missing!"
          echo "=== dist + dist-electron ==="
          ls dist/ | head -10
          ls dist-electron/ | head -10
          echo "=== package.json author ==="
          node -e "console.log(require('./package.json').author)"

      - name: Package (electron-builder)
        working-directory: desktop
        env:
          DEBUG: electron-builder
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --${{ env.ARCH }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: machi-${{ env.ARCH }}
          path: desktop/release/*-${{ env.ARCH }}.dmg
