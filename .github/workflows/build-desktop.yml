# Build Machi Desktop (macOS) with bundled agx-server; upload DMG/ZIP artifacts.
# Optional secrets: CSC_LINK, CSC_KEY_PASSWORD, APPLE_ID, APPLE_ID_PASSWORD, APPLE_TEAM_ID

name: Build Desktop

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "macOS architecture to build (arm64 = Apple Silicon, x64 = Intel)"
        required: true
        default: arm64
        type: choice
        options:
          - arm64
          - x64
  push:
    tags:
      - "v*"

jobs:
  build-tag:
    if: github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: arm64
          - os: macos-13
            arch: x64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Python 3.12 removed stdlib distutils; node-gyp (node-pty rebuild) still imports it.
      - name: Install setuptools for node-gyp
        run: python3 -m pip install --upgrade pip setuptools

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build agx-server (single arch)
        run: packaging/build_backend.sh ${{ matrix.arch }}

      - name: Stage bundled backend (arm64 / x64)
        run: |
          mkdir -p "desktop/bundled-backend/${{ matrix.arch }}"
          cp "packaging/dist/${{ matrix.arch }}/agx-server" "desktop/bundled-backend/${{ matrix.arch }}/agx-server"
          chmod +x "desktop/bundled-backend/${{ matrix.arch }}/agx-server"

      - name: Install desktop deps
        working-directory: desktop
        run: npm ci

      - name: Build renderer + main
        working-directory: desktop
        run: npm run build

      - name: Package (electron-builder, arm64 / x64)
        working-directory: desktop
        env:
          DEBUG: electron-builder
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --${{ matrix.arch }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: machi-${{ matrix.arch }}
          path: |
            desktop/release/*.dmg
            desktop/release/*.zip

  build-dispatch:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ${{ github.event.inputs.arch == 'x64' && 'macos-13' || 'macos-14' }}
    env:
      ARCH: ${{ github.event.inputs.arch }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install setuptools for node-gyp
        run: python3 -m pip install --upgrade pip setuptools

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build agx-server
        run: packaging/build_backend.sh "${{ env.ARCH }}"

      - name: Stage bundled backend
        run: |
          mkdir -p "desktop/bundled-backend/${{ env.ARCH }}"
          cp "packaging/dist/${{ env.ARCH }}/agx-server" "desktop/bundled-backend/${{ env.ARCH }}/agx-server"
          chmod +x "desktop/bundled-backend/${{ env.ARCH }}/agx-server"

      - name: Install desktop deps
        working-directory: desktop
        run: npm ci

      - name: Build renderer + main
        working-directory: desktop
        run: npm run build

      - name: Pre-flight check
        working-directory: desktop
        run: |
          echo "=== bundled-backend ==="
          ls -lR bundled-backend/ || echo "bundled-backend missing!"
          echo "=== dist + dist-electron ==="
          ls dist/ | head -10
          ls dist-electron/ | head -10
          echo "=== package.json author ==="
          node -e "console.log(require('./package.json').author)"

      - name: Package (electron-builder)
        working-directory: desktop
        env:
          DEBUG: electron-builder
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --${{ env.ARCH }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: machi-${{ env.ARCH }}
          path: |
            desktop/release/*.dmg
            desktop/release/*.zip
