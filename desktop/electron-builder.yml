appId: com.agenticx.desktop
productName: Machi
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
extraResources:
  - assets/**/*
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  icon: assets/icon.icns
  category: public.app-category.developer-tools
win:
  target:
    - nsis
  icon: assets/icon.ico
linux:
  target:
    - AppImage
