appId: com.agenticx.desktop
productName: Machi
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
extraResources:
  - assets/**/*
# afterSign: scripts/mac/notarize.js  # 公证在本地签名时启用；CI 无 Apple 证书时跳过
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: assets/icon.icns
  category: public.app-category.developer-tools
  gatekeeperAssess: false
  extraResources:
    - from: bundled-backend/${arch}
      to: backend
      filter:
        - "**/*"
win:
  target:
    - nsis
  icon: assets/icon.ico
linux:
  target:
    - AppImage
