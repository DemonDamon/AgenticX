# 签名 + 公证专用配置；CI 在注入 CSC_LINK 时使用（见 build-desktop.yml）。
appId: com.agenticx.desktop
productName: Near
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
extraResources:
  - assets/**/*
afterPack: scripts/verify-bundled-backend.js
afterSign: scripts/mac/notarize.js
mac:
  artifactName: "${productName}-${version}-${arch}.${ext}"
  target:
    - target: dmg
  icon: assets/icon.icns
  category: public.app-category.developer-tools
  # electron-builder 25+ 不接受 "Developer ID Application:" 前缀，留空则按 CSC_LINK 自动匹配
  identity: null
  hardenedRuntime: true
  entitlements: scripts/mac/entitlements.mac.plist
  entitlementsInherit: scripts/mac/entitlements.mac.plist
  gatekeeperAssess: false
  extraResources:
    - from: bundled-backend/${arch}
      to: backend
      filter:
        - "**/*"
win:
  artifactName: "${productName}-${version}-win-x64.${ext}"
  target:
    - nsis
  icon: assets/icon.ico
  extraResources:
    - from: bundled-backend/win-amd64
      to: backend
      filter:
        - "**/*"
linux:
  target:
    - AppImage
